name: PHP Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Lint all PHP files (php -l)
      run: |
        set -e
        find . -type f -name '*.php' -not -path './vendor/*' -print0 \
          | xargs -0 -n1 -P4 php -l
